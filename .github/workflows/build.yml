name: build desktop app

# Push a tag like v0.1.0 to build installers for all three OSes and attach them
# to the matching GitHub Release. Or run manually from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish installers to the release (off = build-only verification)"
        type: boolean
        default: false

# electron-builder creates the GitHub Release, which needs write access to contents.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        working-directory: electron-app
        run: npm install
      - name: Build installers (publish only on tag or when asked)
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish ${{ (github.event_name == 'push' || inputs.publish) && 'always' || 'never' }}
